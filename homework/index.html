<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home work #66</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Homework #66</h2>

    <div class="card p-3 mb-4">
        <h4>Задание 1</h4>

        <div id="string-1">Ядра в вёдра, выдру в тундру!</div>
        <div id="string-2">Выдрав с выдры в тундре гетры</div>
        <div id="string-3">В недрах тундры, выдры в гетрах</div>
        <div id="string-4">Вытру гетрой выдре морду</div>
        <div id="string-5">Тырят в вёдра ядра кедров!</div>
        <div id="string-6">Вытру выдрой ядра кедров</div>
    </div>

    <div class="card p-3 mb-4">
        <h4>Задание 2</h4>

        <div class="element">Element 1</div>
        <div class="element">Element 2</div>
        <div class="element">Element 3</div>
        <div class="element">Element 4</div>
        <div class="element">Element 5</div>
        <div class="element">Element 6</div>
    </div>

    <div class="card p-3 mb-4">
        <h4>Задание 3</h4>

        <div id="container"></div>
    </div>

</div>

<script>
    'use strict';

    const order = [3, 5, 2, 6, 4, 1];

    for (let i = 0; i < order.length; i++) {
        const element = document.getElementById(`string-${order[i]}`);
        console.log(element.innerHTML);
    }

    const elements = document.getElementsByClassName('element');

    for (let i = 0; i < elements.length; i++) {
        if (i < 3) {
            elements[i].style.color = 'red';
        } else {
            elements[i].style.color = 'green';
        }
    }

    const container = document.getElementById('container');

    for (let i = 1; i <= 5; i++) {
        const div = document.createElement('div');
        div.classList.add('element');
        div.innerHTML = `Element ${i}`;
        container.append(div);
    }
</script>

</body>
</html>
